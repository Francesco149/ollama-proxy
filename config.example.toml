[skills]
dir = "/opt/ai-lab/skills"
max_skills = 2
min_score = 0.15

[server]
llama_base = "http://localhost:8080"
ingest_base = "http://localhost:8083"
embedding_base = "http://localhost:6080"
model_name = "gemma4"
proxy_port = 11434
shell_server_port = 8000

[autorun]
# When enabled, <run-shell> and <run-python> blocks emitted by the LLM are
# executed automatically and their output is injected back into context so
# the LLM can continue reasoning without user intervention.
# max_iterations: hard cap on how many command-execute-continue cycles to allow
# max_consecutive_failures: stop if this many iterations in a row produce non-zero exits
enabled = false
max_iterations = 10
max_consecutive_failures = 3

[session]
# Path to persist shadow context across proxy restarts.
# Contexts are branch-aware: editing a prior message automatically creates
# a new branch with no stale history.
# Omit or leave empty to disable persistence (in-memory only).
persist_path = "/opt/ai-lab/ollama-proxy/sessions.json"
